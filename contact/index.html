<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact CluckClock Support</title>
  <meta name="description" content="Need help with CluckClock? Contact support for troubleshooting and account-related questions.">
  <link rel="canonical" href="https://cluckclock.app/contact">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#121212; --text:#f5f5f5; --text-muted:#a0a0a0; --sunrise:#FF7F50; --border:#2d2d2d; --font-head:'Fraunces', Georgia, serif; --font-body:'DM Sans', system-ui, sans-serif; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:var(--font-body); background:var(--bg); color:var(--text); line-height:1.65; -webkit-font-smoothing:antialiased; }
    .wrap { max-width:760px; margin:0 auto; padding:2rem 1.25rem 3rem; }
    .brand { color:var(--sunrise); text-decoration:none; font-weight:600; }
    h1 { font-family:var(--font-head); margin:0.25rem 0 0.8rem; font-size:clamp(1.9rem,4vw,2.5rem); }
    p { margin:0.5rem 0; color:var(--text-muted); }
    .card { margin-top:1rem; padding:1rem 1.1rem; border:1px solid var(--border); border-radius:12px; }
    a { color:var(--sunrise); }
    footer { margin-top:2.5rem; padding-top:1rem; border-top:1px solid var(--border); color:var(--text-muted); font-size:0.95rem; }
    footer a { color:var(--sunrise); text-decoration:none; }
    footer a:hover { text-decoration:underline; }
    .links { display:flex; flex-wrap:wrap; gap:0.75rem; align-items:center; }
    .dot { opacity:0.55; }
  </style>
</head>
<body>
  <main class="wrap">
    <a class="brand" href="/">CluckClock</a>
    <h1>Contact Support</h1>
    <p>Need help with CluckClock? Email <a href="mailto:support@cluckclock.app">support@cluckclock.app</a> and include your iOS version and app version for faster troubleshooting.</p>
    <div class="card">
      <p><strong style="color:#f5f5f5;">Response window:</strong> Usually within 24-48 hours.</p>
      <p><strong style="color:#f5f5f5;">App:</strong> CluckClock</p>
      <p><strong style="color:#f5f5f5;">Website:</strong> <a href="https://cluckclock.app">cluckclock.app</a></p>
    </div>

    <footer>
      <div class="links">
        <a href="/privacy">Privacy Policy</a>
        <span class="dot">•</span>
        <a href="/terms">Terms of Service</a>
        <span class="dot">•</span>
        <a href="/contact">Contact Support</a>
      </div>
    </footer>
  </main>
</body>
</html>
